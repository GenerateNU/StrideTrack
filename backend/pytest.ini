[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --color=yes
markers =
    unit: marks tests as unit tests (no DB, no network)
    integration: marks tests as integration tests (requires Supabase)
    slow: marks tests as slow
filterwarnings =
    ignore::DeprecationWarning