name: Backend Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13.9

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: |
          supabase init --workdir . || true
          supabase start
        working-directory: ./supabase

      - name: Set environment variables
        run: |
          echo "SUPABASE_URL=$(supabase status --workdir ./supabase | grep 'API URL' | awk '{print $3}')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status --workdir ./supabase | grep 'service_role key' | awk '{print $3}')" >> $GITHUB_ENV
          echo "ENVIRONMENT=test" >> $GITHUB_ENV

      - name: Install dependencies
        run: uv sync
        working-directory: ./backend

      - name: Run tests
        run: make test-ci
        working-directory: ./backend

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./backend/coverage.xml
          fail_ci_if_error: false

      - name: Stop Supabase
        if: always()
        run: supabase stop --workdir ./supabase
