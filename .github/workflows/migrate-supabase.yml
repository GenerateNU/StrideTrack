name: Deploy Supabase Migrations

on:
  push:
    branches: [main]
    paths: ["supabase/migrations/**"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: supabase-production
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run seed file
        run: supabase db execute --db-url "${{ secrets.SUPABASE_DB_URL }}" < supabase/seed.sql