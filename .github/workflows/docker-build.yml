name: Docker Build Check

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yaml"

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend production image
        run: |
          docker build -f backend/Dockerfile.prod -t stridetrack-backend:test backend/

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend production image
        run: |
          docker build -f frontend/Dockerfile.prod -t stridetrack-frontend:test frontend/
