name: Backend Lint Check

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Lint
        run: |
          cd backend
          uv run ruff check

      - name: Format check
        run: |
          cd backend
          uv run ruff format --check