name: Seed Database (Manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "seed" to confirm'
        required: true

jobs:
  seed:
    runs-on: ubuntu-latest
    environment: supabase-production
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "seed" ]; then
            echo "Must type 'seed' to confirm."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      
      - name: Run seed file
        run: supabase db execute --db-url "${{ secrets.SUPABASE_DB_URL }}" < supabase/seed.sql