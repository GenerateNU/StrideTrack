name: Seed Database (Manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "seed" to confirm you want to reseed the database'
        required: true
        default: ''

jobs:
  seed:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "seed" ]; then
            echo "Confirmation failed. You must type 'seed' to proceed."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Run seed file
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db execute --file supabase/seed.sql
