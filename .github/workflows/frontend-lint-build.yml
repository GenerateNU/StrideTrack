name: Frontend Lint & Build

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd frontend
          bun install --frozen-lockfile

      - name: Lint
        run: |
          cd frontend
          bun run lint

      - name: Build (TypeScript + Vite)
        run: |
          cd frontend
          bun run build
